# Configuracion de notion-knowledge.
# Rellena el `id` de cada base de datos de Notion (32 hex, sin guiones o con ellos).
# `type` debe ser uno de: wiki | meeting | ticket.

[settings]
cache_dir = "data/raw"
export_dir = "data/export"

[databases.wiki]
id = ""               # TODO: id de la base de datos de wiki / documentacion interna
type = "wiki"
title_property = "Name"

[databases.meetings]
id = "6e72ecf8474d486b958418484940a845"
type = "meeting"
title_property = "Name"

[databases.tickets]
id = "1728ced44f1880b2b587d411f8f4e7ed"
type = "ticket"
title_property = "Name"

[databases.notes]
id = "2cf0db3da4e845fab1c84dd2315625b5"
type = "note"
title_property = "Nombre"
