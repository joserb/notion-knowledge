schema_version: 1
id: notion-knowledge
name: "Notion · Conocimiento interno"
version: "0.1.0"
status: poc
owner: "Equipo I+D"
description: >
  Recopila conocimiento interno desde Notion (wiki/documentacion, actas de reunion y
  tickets entre equipos), mantiene una cache local y permite busqueda/Q&A. Adaptador
  de contrato para twave-agent-hub: lee un ToolRequest por STDIN y devuelve un
  ToolResponse por STDOUT desde la cache.
domain: other
runtime: local_script
repository: "https://github.com/joserb/notion-knowledge"
tags: [notion, knowledge, wiki, meetings, tickets, search]

# Clasificacion para la planificacion del hub (ver twave-agent-hub manifest.schema).
# Conocimiento curado sobre cache local sincronizada desde Notion.
tool_type: curated_domain_tool
data_mode: curated
freshness_policy: last_sync
risk_level: low
capability_mode: read_only

entities:
  - { name: document, access: read }
  - { name: ticket, access: read }

auth:
  type: api_token
  secret_ref: NOTION_TOKEN
  scopes: [read]

endpoint:
  type: local_script
  command: "uv run python -m notion_knowledge.agent_adapter"
  working_dir: "."

capabilities:
  - id: search_knowledge
    title: "Buscar en el conocimiento interno"
    description: "Busqueda full-text sobre wiki, actas y tickets cacheados."
    access: read-only
    intents: [buscar_conocimiento, consultar_wiki, buscar_acta, q_and_a]
    input_schema:
      query:  { type: string, required: true }
      source: { type: string, required: false, description: "wiki | meetings | tickets" }
      kind:   { type: string, required: false, enum: ["wiki", "meeting", "ticket"] }
      limit:  { type: integer, required: false, default: 10 }
    output_entities: [document, ticket]
    produces_sources: true
    side_effects: none

  - id: get_document
    title: "Obtener un documento"
    description: "Devuelve un item de conocimiento por id, con su texto completo."
    access: read-only
    intents: [abrir_documento, ver_pagina]
    input_schema:
      id: { type: string, required: true }
    output_entities: [document, ticket]
    produces_sources: true
    side_effects: none

  - id: list_sources
    title: "Listar fuentes de conocimiento"
    description: "Bases de datos configuradas y nº de items en cache."
    access: read-only
    intents: [listar_fuentes]
    output_entities: [document]
    produces_sources: true
    side_effects: none

  - id: stats
    title: "Estadisticas de tickets, reuniones o notas"
    description: >
      Segmenta los tickets (tipo, asignado, prioridad, estado), las reuniones (tipo,
      modalidad, tema, moderador, asistentes, redactado por) o las notas (origen,
      actividad, responsable, importante, archivada) desde la cache. Opcionalmente:
      tiempo hasta cambio de estado (tickets) o conteo por anio (reuniones / notas).
    access: read-only
    intents: [estadisticas, segmentar_tickets, segmentar_reuniones, segmentar_notas, metricas]
    input_schema:
      source: { type: string, required: true, enum: ["tickets", "meetings", "notes"] }
      year:   { type: integer, required: false, description: "Filtra por anio (creacion de ticket / Fecha de reunion / Creada de nota)" }
      timing: { type: boolean, required: false, description: "Solo tickets: tiempo (proxy) hasta cambio de estado" }
      trend:  { type: boolean, required: false, description: "Reuniones o notas: numero de items por anio" }
    output_entities: []
    produces_sources: false
    side_effects: none

  - id: export_entity_cards
    title: "Exportar entity cards al atlas"
    description: >
      Genera entity cards de documentos/actas (document) y tickets en formato del
      twave-knowledge-atlas (data/exports/entity_cards.jsonl) desde la cache local.
      Escribe un fichero local; no modifica Notion.
    access: read-only
    intents: [exportar_atlas, generar_entity_cards, alimentar_atlas]
    input_schema:
      out:    { type: string, required: false, description: "Ruta del JSONL de salida" }
      source: { type: string, required: false, description: "Filtra por fuente (wiki, meetings, tickets)" }
    output_entities: [document, ticket]
    produces_sources: false
    side_effects: writes

data_sources:
  - id: notion_db_wiki
    kind: notion_database
    description: "Base de datos de wiki / documentacion interna en Notion"
    reference_ref: NOTION_WIKI_DB_ID
  - id: notion_db_meetings
    kind: notion_database
    description: "Base de datos de actas / notas de reunion en Notion"
    reference_ref: NOTION_MEETINGS_DB_ID
  - id: notion_db_tickets
    kind: notion_database
    description: "Base de datos de tickets entre equipos en Notion"
    reference_ref: NOTION_TICKETS_DB_ID
  - id: notion_db_notes
    kind: notion_database
    description: "Base de datos de notas (origen, actividad, responsable) en Notion"
    reference_ref: NOTION_NOTES_DB_ID

limitations:
  - "Trabaja sobre la cache local (data/raw); ejecuta `fetch` para actualizarla."
  - "La calidad de la busqueda depende de la cobertura de la cache."
  - "Solo lectura; no escribe en Notion."
